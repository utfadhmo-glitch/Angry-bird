<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tania ❤️ Angry Cutie</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  text-align:center;
  overflow-x:hidden;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* PASSWORD SCREEN */
#passwordScreen{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:linear-gradient(135deg,#ff4e88,#ff9ecf);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.password-box{
  background:white;
  padding:30px;
  border-radius:25px;
  text-align:center;
  color:#ff4e88;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
}
.password-box input{
  padding:12px;
  border-radius:20px;
  border:1px solid #ff4e88;
  text-align:center;
  outline:none;
}
.password-box button{
  background:#ff4e88;
  color:white;
  padding:10px 25px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  transition:0.3s;
}
.password-box button:hover{ transform:scale(1.1);}
#errorMsg{ color:red; margin-top:10px;}

/* Heart burst animation */
.unlock-heart{
  position:fixed;
  font-size:28px;
  pointer-events:none;
  animation:heartBurst 1s ease-out forwards;
}
@keyframes heartBurst{
  0%{transform:scale(0); opacity:1;}
  100%{transform:translate(var(--x),var(--y)) scale(2); opacity:0;}
}

/* MAIN DESIGN */
.container{
  position:relative; 
  z-index:2; 
  padding:60px 20px;
}
.button-group{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}
button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
#yesBtn{ background:white; color:#ff4e88;}
#yesBtn:hover{ transform:scale(1.1);}
#noBtn{ background:black; color:white; position:relative;}
.love-photo{
  width:240px;
  max-width:90%;
  border-radius:20px;
  margin:20px auto;
  display:block;
  box-shadow:0 0 25px rgba(255,78,136,0.6);
  animation:heartbeat 1.5s infinite;
}
@keyframes heartbeat{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

/* Proposal Screen */
#proposalScreen{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('proposal-bg.jpg') no-repeat center center fixed;
  background-size:cover;
  display:flex; justify-content:center; align-items:center; flex-direction:column;
  opacity:0; pointer-events:none;
  transition:opacity 1s ease;
  z-index:1000;
}
#proposalScreen.active{
  opacity:1; pointer-events:auto;
}
.bigHeart{
  font-size:100px;
  animation:pop 1.5s infinite;
}
@keyframes pop{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}
.proposalText{
  font-size:26px;
  margin-top:20px;
  padding:0 20px;
  color:#fff;
  text-shadow:0 0 15px rgba(0,0,0,0.7);
  opacity:0;
  transition:opacity 1s ease;
}

/* Floating hearts */
.floating-heart{
  position:fixed;
  bottom:-20px;
  font-size:20px;
  animation:floatUp 6s linear forwards;
  pointer-events:none;
}
@keyframes floatUp{ 
  to{ transform:translateY(-110vh); opacity:0;} 
}
</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="passwordScreen">
  <div class="password-box">
    <h2>অনেক ভালোবাসি তোমায় 💌</h2>
    <input type="password" id="passwordInput" placeholder="Enter Password">
    <br><br>
    <button onclick="checkPassword()">Destroy My Heart ❤️</button>
    <p id="errorMsg"></p>
  </div>
</div>

<div class="container">
<h1>Happy Valentine’s Day আমার Angry Bird ❤️</h1>
<img src="pic.jpg" class="love-photo">
<h2>Will You Stay With Me Forever?</h2>

<div class="button-group">
  <button id="yesBtn" onclick="showProposal()">YES 💍</button>
  <button id="noBtn">NO 😢</button>
</div>
</div>

<div id="proposalScreen">
  <div class="bigHeart">💖</div>
  <div class="proposalText" id="proposalText">
    Angry Bird ❤️<br>
    You are my forever, my always, my everything.<br>
    I promise to love you for the rest of my life 💍✨
  </div>
</div>

<script>
/* PASSWORD SYSTEM */
function checkPassword(){
  const correctPassword="Ragaben na amk 😠";
  const entered=document.getElementById("passwordInput").value;
  if(entered===correctPassword){ heartUnlock(); }
  else { document.getElementById("errorMsg").innerText="Wrong Password 😢"; }
}

function heartUnlock(){
  for(let i=0;i<40;i++){
    const heart=document.createElement("div");
    heart.className="unlock-heart"; 
    heart.innerHTML="💖";
    heart.style.left=window.innerWidth/2+"px";
    heart.style.top=window.innerHeight/2+"px";
    const x=(Math.random()-0.5)*800+"px";
    const y=(Math.random()-0.5)*800+"px";
    heart.style.setProperty("--x",x);
    heart.style.setProperty("--y",y);
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),1000);
  }
  setTimeout(()=>{ 
    document.getElementById("passwordScreen").style.display="none"; 
  },1000);
}

/* NO BUTTON RUN */
const noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseenter",()=>{
  noBtn.style.position="fixed";
  noBtn.style.top=Math.random()*(window.innerHeight-60)+"px";
  noBtn.style.left=Math.random()*(window.innerWidth-120)+"px";
});

/* PROPOSAL */
let heartInterval=null;
function createFloatingHeart(){
  const heart=document.createElement("div");
  heart.className="floating-heart"; 
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*window.innerWidth+"px";
  heart.style.fontSize=(15+Math.random()*30)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
}

function showProposal(){
  const proposal=document.getElementById("proposalScreen");
  const text=document.getElementById("proposalText");

  proposal.style.opacity="1";
  proposal.style.pointerEvents="auto";

  setTimeout(()=>{ text.style.opacity=1; },200);

  if(!heartInterval){
    heartInterval=setInterval(createFloatingHeart,250);
  }
}
</script>

</body>
</html>
